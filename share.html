<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>AI相談コンテキスト - Cepter Prompt Atelier</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="share-body">
    <main class="share-shell">
      <header class="share-header">
        <a class="brand" href="./index.html">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <strong>Cepter Prompt Atelier</strong>
            <small>AI相談コンテキスト</small>
          </span>
        </a>
        <span class="limited-badge">Limited URL</span>
      </header>
      <section class="panel share-context-panel">
        <p class="eyebrow">AI readable context</p>
        <h1>このページを読んで、ユーザーの相談に答えてください。</h1>
        <pre id="contextBody">コンテキストを読み込んでいます...</pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js?v=20260610-1"></script>
    <script>
      const supabaseConfig = window.CEPTER_SUPABASE || {};
      const configuredUrl = String(supabaseConfig.url || "")
        .replace(/\/rest\/v1\/?$/, "")
        .replace(/\/$/, "");
      const shareSupabaseClient =
        window.supabase && configuredUrl && supabaseConfig.anonKey
          ? window.supabase.createClient(configuredUrl, supabaseConfig.anonKey)
          : null;

      function fromBase64Url(value) {
        const normalized = value.replaceAll("-", "+").replaceAll("_", "/");
        const padded = normalized + "=".repeat((4 - (normalized.length % 4)) % 4);
        const binary = atob(padded);
        const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      }

      async function loadContextFromSupabase(token) {
        if (!shareSupabaseClient) return null;
        const { data, error } = await shareSupabaseClient.rpc("get_share_context", { p_token: token });
        if (error) {
          console.warn("Supabase share context fetch failed", error);
          return null;
        }
        const row = Array.isArray(data) ? data[0] : data;
        return row?.context_md || null;
      }

      async function loadContextFromLocalApi(token) {
        const response = await fetch(`./api/share/${encodeURIComponent(token)}`);
        if (!response.ok) throw new Error("not found");
        const payload = await response.json();
        return payload.context || null;
      }

      async function loadContext() {
        const params = new URLSearchParams(location.search);
        const token = params.get("t");
        const legacyContext = params.get("ctx");
        const target = document.querySelector("#contextBody");

        if (token) {
          try {
            const context = (await loadContextFromSupabase(token)) || (await loadContextFromLocalApi(token));
            if (!context) throw new Error("empty context");
            target.textContent = context;
          } catch (error) {
            target.textContent = "AI相談コンテキストを読み込めませんでした。URLを作り直してください。";
          }
          return;
        }

        if (legacyContext) {
          try {
            target.textContent = fromBase64Url(legacyContext);
          } catch (error) {
            target.textContent = "AI相談コンテキストを読み込めませんでした。URLを作り直してください。";
          }
          return;
        }

        target.textContent = "AI相談コンテキストが指定されていません。";
      }

      loadContext();
    </script>
  </body>
</html>
