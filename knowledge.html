<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>公開ナレッジ - Cepter Prompt Atelier</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="share-body">
    <main class="share-shell">
      <header class="share-header">
        <a class="brand" href="./index.html">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <strong>Cepter Prompt Atelier</strong>
            <small>セプターナレッジバンク</small>
          </span>
        </a>
        <span class="limited-badge">AI Reference</span>
      </header>
      <section class="panel share-context-panel">
        <p class="eyebrow">CEPTER's KNOWLEDGE BANK</p>
        <h1>公開ナレッジ</h1>
        <pre id="knowledgeBody">公開ナレッジを読み込んでいます...</pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js?v=20260610-1"></script>
    <script>
      const VIEWPOINT_LABELS = {
        book: "ブック",
        play: "立ち回り",
        other: "その他",
      };

      const BADGE_LABELS = {
        green: "緑バッジ",
        blue: "薄青バッジ",
        purple: "紫バッジ",
        red: "赤バッジ",
        gold: "金バッジ",
      };

      const supabaseConfig = window.CEPTER_SUPABASE || {};
      const configuredUrl = String(supabaseConfig.url || "")
        .replace(/\/rest\/v1\/?$/, "")
        .replace(/\/$/, "");
      const knowledgeSupabaseClient =
        window.supabase && configuredUrl && supabaseConfig.anonKey
          ? window.supabase.createClient(configuredUrl, supabaseConfig.anonKey)
          : null;

      function formatDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return date.toLocaleString("ja-JP", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function cardNameFromId(cardId) {
        const parts = String(cardId || "").split("-");
        if (parts.length <= 3) return cardId || "";
        return parts.slice(2, -1).join("-");
      }

      async function loadTokenKnowledge(token) {
        if (!knowledgeSupabaseClient) return null;
        const { data, error } = await knowledgeSupabaseClient.rpc("get_share_context", { p_token: token });
        if (error) {
          console.warn("private knowledge fetch failed", error);
          return null;
        }
        const row = Array.isArray(data) ? data[0] : data;
        return row?.context_md || null;
      }

      function buildKnowledgeMarkdown(posts, relatedByPostId) {
        if (!posts.length) {
          return "# セプターナレッジバンク\n\nまだ公開ナレッジはありません。";
        }
        const body = posts
          .map((post) => {
            const relatedCards = relatedByPostId.get(post.id) || [];
            return `## ${post.title}

- 観点: ${VIEWPOINT_LABELS[post.viewpoint] || "ブック"}
- 関連カード: ${relatedCards.length ? relatedCards.map(cardNameFromId).join(" / ") : "なし"}
- Like数: ${Number(post.likes_count || 0)}
- 投稿者バッジ: ${BADGE_LABELS[post.author_badge_tier] || "緑バッジ"}
- 投稿日時: ${formatDate(post.created_at)}

### コメント

${post.comment}`;
          })
          .join("\n\n");

        return `# セプターナレッジバンク

このページはAIが参照するための公開ナレッジ一覧です。
Like数が多い投稿ほど、複数の閲覧者に評価されているものとして扱ってください。
ただし、相談者のブック、所持カード、ストラテジーと矛盾する場合は、相談者の状況を優先してください。

${body}`;
      }

      async function loadKnowledge() {
        const params = new URLSearchParams(location.search);
        const token = params.get("t");
        const target = document.querySelector("#knowledgeBody");
        if (!knowledgeSupabaseClient) {
          target.textContent = "Supabase設定が見つからないため、公開ナレッジを読み込めませんでした。";
          return;
        }

        try {
          if (token) {
            const context = await loadTokenKnowledge(token);
            if (!context) throw new Error("token context not found");
            document.title = "秘蔵ナレッジ - Cepter Prompt Atelier";
            document.querySelector(".share-context-panel h1").textContent = "秘蔵ナレッジ";
            target.textContent = context;
            return;
          }

          const { data: posts, error: postsError } = await knowledgeSupabaseClient
            .from("public_knowledge_feed")
            .select("*")
            .order("likes_count", { ascending: false })
            .order("created_at", { ascending: false })
            .limit(500);
          if (postsError) throw postsError;

          const postIds = (posts || []).map((post) => post.id);
          const relatedByPostId = new Map();
          if (postIds.length) {
            const { data: related, error: relatedError } = await knowledgeSupabaseClient
              .from("knowledge_related_cards")
              .select("post_id, position, card_id")
              .in("post_id", postIds)
              .order("position", { ascending: true });
            if (relatedError) throw relatedError;
            (related || []).forEach((row) => {
              if (!relatedByPostId.has(row.post_id)) relatedByPostId.set(row.post_id, []);
              relatedByPostId.get(row.post_id).push(row.card_id);
            });
          }

          target.textContent = buildKnowledgeMarkdown(posts || [], relatedByPostId);
        } catch (error) {
          console.warn("public knowledge fetch failed", error);
          target.textContent = "公開ナレッジを読み込めませんでした。時間を置いて再度アクセスしてください。";
        }
      }

      loadKnowledge();
    </script>
  </body>
</html>
